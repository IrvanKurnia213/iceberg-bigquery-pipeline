connector.name=iceberg
iceberg.catalog.type=jdbc

# New Property Names (Post-Trino 400+)
iceberg.jdbc-catalog.catalog-name=main
iceberg.jdbc-catalog.driver-class=org.postgresql.Driver
iceberg.jdbc-catalog.connection-url=jdbc:postgresql://metastore-db:5432/metastore
iceberg.jdbc-catalog.connection-user=hive
iceberg.jdbc-catalog.connection-password=hive
iceberg.jdbc-catalog.default-warehouse-dir=s3://warehouse/

# Storage Logic
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.region=us-east-1

# Credentials
s3.aws-access-key=minio
s3.aws-secret-key=minio123